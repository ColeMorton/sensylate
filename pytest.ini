[tool:pytest]
testpaths = tests team-workspace/framework/tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --verbose
    --tb=short
    --disable-warnings
    --strict-markers
    --no-cov
filterwarnings =
    ignore::DeprecationWarning
    ignore::PytestDeprecationWarning
    ignore::RuntimeWarning
markers =
    integration: Integration tests
    unit: Unit tests
    framework: Framework tests
    slow: Slow tests
